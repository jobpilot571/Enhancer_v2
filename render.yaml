services:
  - type: web
    name: jobpilot-resume-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ALLOWED_ORIGINS
        value: "https://enhancer-v2.vercel.app,https://jobpilot.ai"
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_PROVIDER_ORDER
        value: "openai,groq,claude,gemini"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PORT
        value: "3001"
